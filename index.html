<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PhD Paper Hub - Professional Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #FFFFFF; }
        [x-cloak] { display: none !important; }
        .prose ul { list-style-type: disc; padding-left: 1.5rem; margin-bottom: 1rem; }
        .prose ol { list-style-type: decimal; padding-left: 1.5rem; margin-bottom: 1rem; }
        .prose strong { font-weight: 700; color: #0F172A; }
    </style>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { 
                        dataset: '#FCE5D6', 
                        dynamic: '#DEEAF7', 
                        Privacy: '#F1F5F9', 
                        iosDark: '#0F172A', 
                        iosText: '#475569' 
                    },
                    borderRadius: { 'ios': '28px' }
                }
            }
        }
    </script>
</head>
<body x-data="paperApp()" x-init="init()" class="flex h-screen overflow-hidden text-slate-900">

    <aside class="w-64 border-r border-slate-50 flex flex-col p-8 bg-white z-20">
        <div class="mb-12 font-bold text-xl tracking-tight">Research Hub</div>
        <nav class="space-y-6 flex-1">
            <template x-for="tab in tabs" :key="tab.name">
                <div @click="activeTab = tab.name" 
                     :class="activeTab === tab.name ? 'text-slate-900' : 'text-slate-400 hover:text-slate-600'"
                     class="flex items-center cursor-pointer transition-all group">
                    <div :style="`background-color: ${tab.color}`" class="w-2 h-2 rounded-full mr-3"></div>
                    <span class="flex-1 font-semibold text-sm" x-text="tab.name"></span>
                    <span x-show="activeTab === tab.name" x-text="getTabCount(tab.name)" :style="`background-color: ${tab.color}`" class="text-[10px] px-2 py-0.5 rounded-full font-bold"></span>
                </div>
            </template>
        </nav>
        <div class="pt-8 border-t border-slate-50">
            <p class="text-[10px] text-slate-300 font-bold uppercase tracking-widest mb-1">Total Collection</p>
            <p class="text-2xl font-bold" x-text="papers.length"></p>
        </div>
    </aside>

    <main class="flex-1 overflow-y-auto p-12 bg-white">
        <div class="max-w-4xl mx-auto">
            <div class="flex items-center gap-6 mb-12">
                <h2 class="text-[11px] font-black text-slate-300 tracking-[3px] uppercase" x-text="activeTab.toUpperCase() + ' / TIMELINE'"></h2>
                <div class="h-px bg-slate-50 flex-1"></div>
            </div>

            <template x-for="(group, date) in groupedPapers" :key="date">
                <div class="mb-12">
                    <div class="text-[10px] font-bold text-slate-200 mb-6 tracking-widest" x-text="date"></div>
                    <div class="grid gap-6">
                        <template x-for="paper in group" :key="paper.title">
                            <div @click="openDrawer(paper.title)" 
                                 :class="activeTab === 'Dataset' ? 'hover:border-dataset' : activeTab === 'Dynamic Secrets' ? 'hover:border-dynamic' : 'hover:border-slate-200'"
                                 class="group border border-slate-50 rounded-ios p-7 transition-all cursor-pointer bg-white hover:shadow-sm">
                                
                                <div class="flex items-center gap-3 mb-4">
                                    <span :style="`background-color: ${tabs.find(t => t.name === activeTab)?.color || '#F1F5F9'}`"
                                          class="text-[10px] font-bold px-3 py-0.5 rounded-full" 
                                          x-text="paper.year"></span>
                                    <span class="text-[10px] font-bold text-slate-300 uppercase tracking-widest" x-text="paper.venue"></span>
                                </div>
                        
                                <h3 class="text-lg font-bold text-slate-800 leading-tight mb-4 group-hover:text-slate-900" x-text="paper.title"></h3>
                        
                                <div class="space-y-1.5 border-t border-slate-50 pt-4">
                                    <p class="text-[11px] font-semibold text-slate-500 flex items-center">
                                        <span class="mr-2 opacity-50">👤</span>
                                        <span x-text="paper.authors || 'Unknown Authors'"></span>
                                    </p>
                                    <p class="text-[10px] text-slate-400 italic flex items-center">
                                        <span class="mr-2 opacity-50">🏛️</span>
                                        <span x-text="paper.affiliations || 'No Affiliation Provided'"></span>
                                    </p>
                                </div>
                            </div>
                        </template>
                    </div>
                </div>
            </template>
        </div>
    </main>

    <div x-show="isDrawerOpen" x-cloak class="fixed inset-0 z-50 flex justify-end">
        <div x-show="isDrawerOpen" x-transition.opacity @click="isDrawerOpen = false" class="absolute inset-0 bg-slate-900/5 backdrop-blur-sm"></div>
        <div x-show="isDrawerOpen" x-transition:enter="transition transform duration-300" x-transition:enter-start="translate-x-full" class="relative w-[520px] bg-white h-full shadow-2xl p-12 overflow-y-auto border-l border-slate-50">
            <button @click="isDrawerOpen = false" class="absolute top-8 right-8 text-slate-300 hover:text-slate-900 text-xl">✕</button>
            <template x-if="activeDetail">
                <article class="mt-12 space-y-12 prose max-w-none">
                    <header>
                        <div class="inline-block px-2 py-0.5 rounded text-[10px] font-bold mb-4 uppercase tracking-widest text-slate-400 border border-slate-100" x-text="activeTab"></div>
                        <h1 class="text-3xl font-bold text-iosDark leading-tight" x-text="activeDetail.title"></h1>
                    </header>
                    <section>
                        <h4 class="text-[10px] font-black text-iosDark uppercase tracking-[3px] mb-4 border-b border-slate-50 pb-2">Summary</h4>
                        <div class="text-sm text-iosText leading-relaxed" x-html="md(activeDetail.summary)"></div>
                    </section>
                    <section>
                        <h4 class="text-[10px] font-black text-iosDark uppercase tracking-[3px] mb-4 border-b border-slate-50 pb-2">Key Insights</h4>
                        <div class="space-y-4">
                            <template x-for="insight in activeDetail.key_insights">
                                <div class="flex gap-4 p-4 bg-slate-50/50 rounded-2xl">
                                    <div class="w-1 h-1 rounded-full bg-slate-200 mt-2"></div>
                                    <div class="text-[13px] text-iosText leading-relaxed" x-html="md(insight)"></div>
                                </div>
                            </template>
                        </div>
                    </section>
                    <section class="bg-slate-50 p-6 rounded-ios border border-slate-100">
                        <h4 class="text-[10px] font-black text-iosDark uppercase tracking-[2px] mb-3">Methodology</h4>
                        <div class="text-[13px] text-slate-500 leading-loose" x-html="md(activeDetail.methodology)"></div>
                    </section>
                </article>
            </template>
        </div>
    </div>

    <script>
        function paperApp() {
            return {
                papers: [], details: [], activeTab: 'Dataset', isDrawerOpen: false, selectedTitle: null,
                tabs: [
                    { name: 'Dataset', color: '#FCE5D6' }, 
                    { name: 'Dynamic Secrets', color: '#DEEAF7' }, 
                    { name: 'Privacy Policy', color: '#F1F5F9' }
                ],
                async init() {
                    const t = Date.now();
                    try {
                        // 强制不使用缓存：添加时间戳并设置 cache: 'no-store'
                        const fetchOptions = { cache: 'no-store' };
                        const [listRes, detailRes] = await Promise.all([
                            fetch(`./papers_list.json?t=${t}`, fetchOptions),
                            fetch(`./papers_detail.json?t=${t}`, fetchOptions)
                        ]);
                        this.papers = await listRes.json();
                        this.details = await detailRes.json();
                    } catch (e) {
                        console.error("Data fetch failed. Ensure local server is running.");
                    }
                },
                md(content) {
                    return content ? marked.parse(content) : '';
                },
                get groupedPapers() {
                    // 按日期排序逻辑：最新的日期排在最前
                    const filtered = this.papers.filter(p => p.category === this.activeTab);
                    const sorted = [...filtered].sort((a, b) => new Date(b.date_read) - new Date(a.date_read));
                    return sorted.reduce((g, p) => {
                        (g[p.date_read] = g[p.date_read] || []).push(p); return g;
                    }, {});
                },
                get activeDetail() { return this.details.find(d => d.title === this.selectedTitle); },
                getTabCount(n) { return this.papers.filter(p => p.category === n).length; },
                openDrawer(t) { this.selectedTitle = t; this.isDrawerOpen = true; }
            }
        }
    </script>
</body>
</html>
